<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santy SexShop 🚀</title>
<style>
:root{--bg:#111;--text:#fff;--card:#222}
.light{--bg:#f5f5f5;--text:#000;--card:#fff}
body{font-family:Arial;margin:0;background:var(--bg);color:var(--text);transition:.3s}
header{background:#e91e63;padding:15px;text-align:center}
nav{background:#222;padding:10px;display:flex;justify-content:center;gap:20px}
nav a{color:#fff;text-decoration:none;font-weight:bold}
.carousel{overflow:hidden;height:420px}
.slides{display:flex;transition:.6s}
.slide{min-width:100%;display:flex;align-items:center;justify-content:center;font-size:36px;background:#333}
.container{padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{background:var(--card);padding:15px;border-radius:12px;text-align:center;transition:.3s;box-shadow:0 4px 15px rgba(0,0,0,0.5)}
.card:hover{transform:scale(1.08)}
.card img{width:100%;border-radius:10px}
.btn{background:#e91e63;border:none;padding:10px;color:#fff;cursor:pointer;border-radius:5px;margin:5px}
.btn:hover{transform:scale(1.05)}

/* TOAST */
.toast{
position:fixed;
bottom:100px;
right:20px;
background:#333;
padding:15px;
border-radius:8px;
opac:0;
opacity:0;
transform:translateY(20px);
transition:.4s;
z-index:2000;
}
.toast.show{opacity:1;transform:translateY(0)}

/* CART */
.cart{position:fixed;right:0;top:0;width:330px;height:100%;background:#000;padding:15px;overflow:auto;transform:translateX(100%);transition:.4s;z-index:1001}
.cart.open{transform:translateX(0)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;opacity:0;pointer-events:none;transition:.3s;z-index:1000}
.overlay.show{opacity:1;pointer-events:all}
.cart-toggle{position:fixed;right:20px;bottom:20px;background:#e91e63;border:none;padding:15px;border-radius:50%;color:#fff;font-size:20px;cursor:pointer;z-index:1002}
.badge{position:absolute;top:-5px;right:-5px;background:red;border-radius:50%;padding:5px 8px;font-size:12px}

.info{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:20px}
.info-box{background:var(--card);padding:15px;border-radius:10px;text-align:center}

.stars{color:gold;font-size:14px}

footer{text-align:center;padding:15px;background:#000;margin-top:20px}
</style>
</head>
<body>
<header>
<h1>Santy SexShop 🚀</h1>
<p>Experiência Premium</p>
</header>

<nav>
<a>Vibradores</a>
<a>Lubrificantes</a>
<a>Fantasias</a>
<a>Kits</a>
</nav>

<div class="carousel">
<div class="slides" id="slides">
<div class="slide">🔥 BLACK FRIDAY</div>
<div class="slide">💋 FRETE GRÁTIS</div>
<div class="slide">⚡ ENTREGA EXPRESS</div>
</div>
</div>

<div class="info">
<div class="info-box">🚚 Frete rápido</div>
<div class="info-box">🔒 Discreto</div>
<div class="info-box">💳 PIX</div>
<div class="info-box">⭐ Top vendas</div>
</div>

<div class="container">
<h2>Produtos</h2>
<div class="products" id="products"></div>
</div>

<button class="cart-toggle" onclick="toggleCart()">🛒<span id="cartCount" class="badge">0</span></button>
<div id="overlay" class="overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">
<h2>Carrinho</h2>
<ul id="cartItems"></ul>
<p>Total: R$ <span id="total">0</span></p>
</div>

<div id="toast" class="toast">Produto adicionado!</div>

<footer>
<p>© Santy</p>
</footer>

<script>
let products=[
{name:'Vibrador Deluxe',price:99.9},
{name:'Lubrificante Premium',price:39.9}
];
let cart=[];

function toast(){
let t=document.getElementById('toast');
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2000);
}

function renderProducts(){
const c=document.getElementById('products');
c.innerHTML='';
products.forEach(p=>{
c.innerHTML+=`<div class="card"><img src="https://via.placeholder.com/200"><h3>${p.name}</h3><div class='stars'>★★★★★</div><p>R$ ${p.price}</p><button class="btn" onclick="addToCart('${p.name}',${p.price})">Comprar</button></div>`;
});}

function addToCart(n,p){
let i=cart.find(x=>x.name===n);
if(i){i.qty++}else{cart.push({name:n,price:p,qty:1})}
renderCart();updateBadge();toast();
}

function renderCart(){
let l=document.getElementById('cartItems');
let t=0;l.innerHTML='';
cart.forEach(i=>{
t+=i.price*i.qty;
l.innerHTML+=`<li>${i.name} x${i.qty} - R$ ${(i.price*i.qty).toFixed(2)}</li>`;
});
document.getElementById('total').innerText=t.toFixed(2);
}

function updateBadge(){
let count=cart.reduce((a,b)=>a+b.qty,0);
document.getElementById('cartCount').innerText=count;
}

function toggleCart(){
document.getElementById('cart').classList.toggle('open');
document.getElementById('overlay').classList.toggle('show');
}

let i=0;
setInterval(()=>{
i=(i+1)%3;
document.getElementById('slides').style.transform=`translateX(-${i*100}%)`
},2000);

renderProducts();
</script>
</body>
</html>
